{% extends "base.html" %}

{% block content %}

<h2>Trabalhadores</h2>

<div class="card p-4 mb-4">

<form method="POST">

<div class="row">

<div class="col-md-4">
<label>Nome</label>
<input name="nome" class="form-control" required>
</div>

<div class="col-md-3">
<label>Função</label>

<select name="funcao" class="form-control">

<option value="Fechamento">Fechamento</option>
<option value="Montagem">Montagem</option>
<option value="Acabamento">Acabamento</option>

</select>

</div>

<div class="col-md-3">
<label>Valor por par</label>
<input name="valor" type="number" step="0.01" class="form-control" required>
</div>

<div class="col-md-2">
<br>
<button class="btn btn-success w-100">
Cadastrar
</button>
</div>

</div>

</form>

</div>


<div class="card">

<div class="card-body">

<table class="table table-striped">

<tr>

<th>Nome</th>
<th>Função</th>
<th>Valor</th>
<th>Produção do dia</th>
<th>Registrar produção</th>
<th>Ações</th>

</tr>

{% for t in lista %}

<tr>

<td>{{t["nome"]}}</td>
<td>{{t["funcao"]}}</td>
<td>R$ {{t["valor"]}}</td>

<td>
—
</td>

<td>

<form action="/produzir/{{t['id']}}" method="POST">

<input name="quantidade"
type="number"
class="form-control"
placeholder="pares">

<button class="btn btn-primary btn-sm mt-1">
Registrar
</button>

</form>

</td>

<td>

<a href="/excluir/{{t['id']}}"
class="btn btn-danger btn-sm">

Excluir

</a>

</td>

</tr>

{% endfor %}

</table>

<a href="/zerar" class="btn btn-warning">
Zerar produção
</a>

</div>

</div>

{% endblock %}
